services:
  jeopardy:
    image: ghcr.io/ebertx/jeopardy-training-app:latest
    container_name: jeopardy-server
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: .env
    ports:
      # Bound to loopback only — exposed externally via `tailscale serve` on the host.
      - "127.0.0.1:3000:3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
