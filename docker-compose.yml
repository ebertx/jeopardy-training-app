services:
  jeopardy:
    image: ghcr.io/ebertx/jeopardy-training-app:latest
    container_name: jeopardy-server
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: .env
    ports:
      # Bound to Tower's Tailscale IP only — reachable from the tailnet, not from LAN/WAN.
      - "100.92.27.16:3000:3000"
    extra_hosts:
      # Lets DATABASE_URL use `host.docker.internal` to reach postgresql15 on the Unraid host.
      - "host.docker.internal:host-gateway"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
