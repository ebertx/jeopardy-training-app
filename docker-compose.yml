services:
  jeopardy:
    image: ghcr.io/ebertx/jeopardy-training-app:latest
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    env_file: .env
    networks:
      - jeopardy-internal
    healthcheck:
      test: ["/app/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - jeopardy-internal
    depends_on:
      jeopardy:
        condition: service_healthy

networks:
  jeopardy-internal:
    driver: bridge
